<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>MSP Research Tools</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0" />

<link href="https://fonts.googleapis.com/css2?family=Google+Sans:wght@400;500;700&display=swap" rel="stylesheet">

<style>
:root{
  --text:#14213D;
  --muted:#667085;
  --line:#D7E3F4;
  --bg:#edf2fb;
}

body{
  margin:0;
  font-family:'Google Sans',sans-serif;
  background:var(--bg);
  color:var(--text);
}

/* NAVBAR MATCHED */
.topbar{
  height:80px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  padding:0 24px;
  background:#fff;
  border-bottom:1px solid rgba(191,209,235,.6);
  box-shadow:0 1px 4px rgba(26,115,232,.07);
}

.brand{
  display:flex;
  align-items:center;
  gap:16px;
}

.brand-logo{
  height:52px;
  width:auto;
  display:block;
  object-fit:contain;
}

.brand-divider{
  width:1px;
  height:32px;
  background:var(--line);
}

.brand-copy{
  display:flex;
  flex-direction:column;
  gap:2px;
}

.brand-title{
  font-size:24px;
  font-weight:800;
  letter-spacing:-.02em;
  text-transform:uppercase;
  line-height:1.05;
}

.brand-desc{
  font-size:12px;
  color:var(--muted);
  line-height:1.4;
}

/* CONTENT */
.page{
  padding:26px;
}

.hero{
  background:#fff;
  border:1px solid var(--line);
  border-radius:24px;
  padding:24px;
  margin-bottom:20px;
}

.hero h1{
  margin:0 0 8px;
  font-size:28px;
}

.hero p{
  margin:0;
  color:var(--muted);
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
  gap:16px;
}

.card{
  background:#fff;
  border:1px solid var(--line);
  border-radius:18px;
  padding:18px;
  text-decoration:none;
  color:inherit;
}

</style>
</head>

<body>

<header class="topbar">
  <div class="brand">
    <img src="logo.png" class="brand-logo">
    <div class="brand-divider"></div>
    <div class="brand-copy">
      <div class="brand-title">MSP RESEARCH TOOLS</div>
      <div class="brand-desc">Access and launch research tools for analysis and statistical testing</div>
    </div>
  </div>
</header>

<main class="page">

<div class="hero">
  <h1>Research Tools Dashboard</h1>
  <p>Select a tool to launch.</p>
</div>

<div class="grid">
  <a class="card" href="https://u3621195.github.io/perceptual-brandmap/">
    Halo Effect Analyzer
  </a>

  <a class="card" href="https://u3621195.github.io/significance-testing/">
    Significance Testing Tool
  </a>
</div>

</main>

</body>
</html>
